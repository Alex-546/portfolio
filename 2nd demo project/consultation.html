<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Consultation | Alex Clothing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="consultation.css">
</head>

<body>

<section class="consultation-hero">

    <div class="overlay"></div>

    <img src="picture/screen.png" alt="">

    <div class="consultation-content">

        <span>PRIVATE CONSULTATION</span>

        <h1>Book A Luxury Styling Session</h1>

        <p>
            Schedule a private appointment with Alex Clothing and
            receive personalized fashion guidance tailored to your style.
        </p>

    </div>

</section>


<section class="booking-section">

    <div class="booking-card">

        <h2>Appointment Details</h2>

        <form id="bookingForm">

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="tel" placeholder="Phone Number" required>

            <input type="date" required>

            <input type="time" required>

            <select required>

                <option value="">
                    Select Consultation Type
                </option>

                <option>
                    Personal Styling
                </option>

                <option>
                    Luxury Fashion Consultation
                </option>

                <option>
                    Bespoke Tailoring
                </option>

                <option>
                    Wedding Styling
                </option>

            </select>

            <textarea placeholder="Tell us about your fashion needs"></textarea>

            <button type="submit">
                Book Appointment
            </button>

        </form>

    </div>

</section>

<script>

document.getElementById("bookingForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    alert(
        "Thank you for booking a consultation with Alex Clothing. Our team will contact you shortly."
    );

    this.reset();

});

</script>

</body>
</html>
